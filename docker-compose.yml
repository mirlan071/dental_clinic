version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: dental_postgres
    environment:
      POSTGRES_DB: dental_clinic
      POSTGRES_USER: dental
      POSTGRES_PASSWORD: dental_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dental -d dental_clinic"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dental_network

  redis:
    image: redis:7-alpine
    container_name: dental_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dental_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dental_app
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=dental_clinic
      - DB_USERNAME=dental
      - DB_PASSWORD=dental_secret
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-dHJ1bHlkb250YWxjbGluaWNzZWNyZXRrZXlmb3Jqd3R0b2tlbjIwMjRzdXBlcnNlY3VyZQ==}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/v1/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - dental_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  dental_network:
    driver: bridge
